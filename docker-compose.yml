services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8889:8888"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=sqlite:///./data/item_time_machine.db
      - SECRET_KEY=item-time-machine-secret-key-change-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
